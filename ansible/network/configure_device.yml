---
- name: Configure Cisco IOS-XE Device via NETCONF
  hosts: ios_xe
  gather_facts: no

  tasks:

    - name: Configure banner login
      ansible.netcommon.netconf_edit_config:
        datastore: running
        content: |
          <config>
            <native xmlns="http://cisco.com/ns/yang/Cisco-IOS-XE-native">
              <banner>
                <login>
                  <banner>^ Authorized users only. NetOps Lab - SECR3253 ^</banner>
                </login>
              </banner>
            </native>
          </config>

    - name: Create local user account
      ansible.netcommon.netconf_edit_config:
        datastore: running
        content: |
          <config>
            <native xmlns="http://cisco.com/ns/yang/Cisco-IOS-XE-native">
              <username>
                <name>netopsuser</name>
                <privilege>15</privilege>
                <secret>
                  <encryption>0</encryption>
                  <secret>NetOps2025!</secret>
                </secret>
              </username>
            </native>
          </config>

    - name: Configure interface description
      ansible.netcommon.netconf_edit_config:
        datastore: running
        content: |
          <config>
            <interfaces xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
              <interface>
                <name>GigabitEthernet2</name>
                <description>Configured by Ansible NETCONF - NetOps Team</description>
              </interface>
            </interfaces>
          </config>

    - name: Configure interface IP address
      ansible.netcommon.netconf_edit_config:
        datastore: running
        content: |
          <config>
            <interfaces xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
              <interface>
                <name>GigabitEthernet2</name>
                <ipv4 xmlns="urn:ietf:params:xml:ns:yang:ietf-ip">
                  <address>
                    <ip>192.168.100.1</ip>
                    <netmask>255.255.255.0</netmask>
                  </address>
                </ipv4>
              </interface>
            </interfaces>
          </config>
