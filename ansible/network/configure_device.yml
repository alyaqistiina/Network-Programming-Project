---
- name: Configure Cisco IOS-XR Device via NETCONF
  hosts: ios_xr
  gather_facts: no

  tasks:

    - name: Configure banner login
      netconf_config:
        host: "{{ ansible_host }}"
        port: "{{ ansible_port }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        hostkey_verify: false
        content: |
          <config>
            <banners xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-infra-infra-cfg">
              <banner>
                <banner-name>login</banner-name>
                <banner-text>^C Authorized users only. NetOps Lab SECR3253 ^C</banner-text>
              </banner>
            </banners>
          </config>

    - name: Create local user account
      netconf_config:
        host: "{{ ansible_host }}"
        port: "{{ ansible_port }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        hostkey_verify: false
        content: |
          <config>
            <aaa xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-aaa-lib-cfg">
              <usernames xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-aaa-locald-cfg">
                <username>
                  <ordering-index>0</ordering-index>
                  <name>netopsuser</name>
                  <secret>NetOps2025!</secret>
                </username>
              </usernames>
            </aaa>
          </config>
      ignore_errors: yes

    - name: Configure interface description
      netconf_config:
        host: "{{ ansible_host }}"
        port: "{{ ansible_port }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        hostkey_verify: false
        content: |
          <config>
            <interface-configurations xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-ifmgr-cfg">
              <interface-configuration>
                <active>act</active>
                <interface-name>GigabitEthernet0/0/0/1</interface-name>
                <description>Configured by Ansible NETCONF - NetOps Team</description>
              </interface-configuration>
            </interface-configurations>
          </config>

    - name: Configure interface IP address
      netconf_config:
        host: "{{ ansible_host }}"
        port: "{{ ansible_port }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        hostkey_verify: false
        content: |
          <config>
            <interface-configurations xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-ifmgr-cfg">
              <interface-configuration>
                <active>act</active>
                <interface-name>GigabitEthernet0/0/0/1</interface-name>
                <ipv4-network xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-ipv4-io-cfg">
                  <addresses>
                    <primary>
                      <address>192.168.100.1</address>
                      <netmask>255.255.255.0</netmask>
                    </primary>
                  </addresses>
                </ipv4-network>
              </interface-configuration>
            </interface-configurations>
          </config>

    - name: Configure static route
      netconf_config:
        host: "{{ ansible_host }}"
        port: "{{ ansible_port }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        hostkey_verify: false
        content: |
          <config>
            <router-static xmlns="http://cisco.com/ns/yang/Cisco-IOS-XR-ip-static-cfg">
              <default-vrf>
                <address-family>
                  <vrfipv4>
                    <vrf-unicast>
                      <vrf-prefixes>
                        <vrf-prefix>
                          <prefix>192.168.200.0</prefix>
                          <prefix-length>24</prefix-length>
                          <vrf-route>
                            <vrf-next-hop-table>
                              <vrf-next-hop-next-hop-address>
                                <next-hop-address>10.0.0.2</next-hop-address>
                              </vrf-next-hop-next-hop-address>
                            </vrf-next-hop-table>
                          </vrf-route>
                        </vrf-prefix>
                      </vrf-prefixes>
                    </vrf-unicast>
                  </vrfipv4>
                </address-family>
              </default-vrf>
            </router-static>
          </config>
      ignore_errors: yes
