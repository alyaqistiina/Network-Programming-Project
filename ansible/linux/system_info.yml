---
- name: Collect Linux system information
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: Get hostname
      command: hostname
      register: hostname_output
      changed_when: false

    - name: Get system/kernel info
      command: uname -a
      register: uname_output
      changed_when: false

    - name: Get current date and time
      command: date
      register: date_output
      changed_when: false

    - name: Get CPU information
      command: lscpu
      register: cpu_output
      changed_when: false

    - name: Get memory usage
      command: free -h
      register: memory_output
      changed_when: false

    - name: Get disk usage
      command: df -h
      register: disk_output
      changed_when: false

    - name: Get logged-in users
      command: who
      register: users_output
      changed_when: false

    - name: Get top 5 processes by CPU usage
      shell: ps aux --sort=-%cpu | head -6
      register: top_processes_output
      changed_when: false

    - name: Display hostname
      debug:
        msg: "{{ hostname_output.stdout }}"

    - name: Display system/kernel info
      debug:
        msg: "{{ uname_output.stdout }}"

    - name: Display current date and time
      debug:
        msg: "{{ date_output.stdout }}"

    - name: Display CPU information
      debug:
        msg: "{{ cpu_output.stdout_lines }}"

    - name: Display memory usage
      debug:
        msg: "{{ memory_output.stdout_lines }}"

    - name: Display disk usage
      debug:
        msg: "{{ disk_output.stdout_lines }}"

    - name: Display logged-in users
      debug:
        msg: "{{ users_output.stdout_lines }}"

    - name: Display top 5 processes by CPU usage
      debug:
        msg: "{{ top_processes_output.stdout_lines }}"
